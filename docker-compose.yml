services:
  pet-content-studio:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Database paths (within container)
      - INTEL_DATABASE_PATH=/app/data/signals.db
      - VIRAL_DATABASE_PATH=/app/data/viral-signals.db
      # Font paths for Linux (FFmpeg text overlays)
      - FFMPEG_FONT=/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf
      - FFMPEG_FONT_BOLD=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf
    restart: unless-stopped
